blueprint:
  name: Notification Queue - Android Last Notification to Action
  description: >-
    Run a configurable action when the Home Assistant Android Companion App Last Notification
    sensor receives a notification matching package/category/channel/title/destination filters.
    Placeholder filters are used by default. Configure private names or phone numbers locally only.
  domain: automation
  source_url: https://github.com/placeholder/ha-notification-queue-blueprints/blob/main/blueprints/automation/android_last_notification_to_queue_action.yaml

  input:
    last_notification_sensor:
      name: Android Last Notification sensor
      selector:
        entity:
          domain: sensor

    allowed_packages:
      name: Allowed package names
      description: >-
        Comma-separated Android package names. Example: com.google.android.apps.messaging,org.thoughtcrime.securesms
      default: "com.google.android.apps.messaging,org.thoughtcrime.securesms"
      selector:
        text: {}

    allowed_categories:
      name: Allowed notification categories
      description: Comma-separated categories. Use msg for messaging notifications. Leave blank to ignore category.
      default: "msg"
      selector:
        text: {}

    allowed_channels:
      name: Allowed channel IDs
      description: Comma-separated channel IDs. Leave blank to ignore channel.
      default: ""
      selector:
        text: {}

    allowed_titles:
      name: Allowed notification titles / senders
      description: >-
        Comma-separated sender/title values. Leave blank to allow all titles. Do not commit real names to a public repo.
      default: ""
      selector:
        text: {}

    allowed_destinations:
      name: Allowed participant destinations
      description: >-
        Comma-separated normalized destinations, such as phone numbers. Leave blank to allow all.
        Do not commit real phone numbers to a public repo.
      default: ""
      selector:
        text: {}

    queue_action:
      name: Queue action
      description: "Example: turn on input_boolean.notification_queue_phone_message."
      selector:
        action: {}

mode: queued
max: 10

variables:
  last_notification_sensor: !input last_notification_sensor
  allowed_packages_raw: !input allowed_packages
  allowed_categories_raw: !input allowed_categories
  allowed_channels_raw: !input allowed_channels
  allowed_titles_raw: !input allowed_titles
  allowed_destinations_raw: !input allowed_destinations

  allowed_packages_list: >-
    {{ allowed_packages_raw.split(',') | map('trim') | reject('equalto', '') | list }}
  allowed_categories_list: >-
    {{ allowed_categories_raw.split(',') | map('trim') | reject('equalto', '') | list }}
  allowed_channels_list: >-
    {{ allowed_channels_raw.split(',') | map('trim') | reject('equalto', '') | list }}
  allowed_titles_list: >-
    {{ allowed_titles_raw.split(',') | map('trim') | reject('equalto', '') | list }}
  allowed_destinations_list: >-
    {{ allowed_destinations_raw.split(',') | map('trim') | reject('equalto', '') | list }}

  notification_package: >-
    {{ state_attr(last_notification_sensor, 'package') | default('', true) }}
  notification_category: >-
    {{ state_attr(last_notification_sensor, 'category') | default('', true) }}
  notification_channel: >-
    {{ state_attr(last_notification_sensor, 'channel_id') | default('', true) }}
  notification_title: >-
    {{ state_attr(last_notification_sensor, 'android.title') | default('', true) }}
  notification_destination: >-
    {{ state_attr(last_notification_sensor, 'extra_im_notification_participant_normalized_destination') | default('', true) }}

trigger:
  - platform: state
    entity_id: !input last_notification_sensor

condition:
  - condition: template
    value_template: >-
      {{ allowed_packages_list | length == 0 or notification_package in allowed_packages_list }}

  - condition: template
    value_template: >-
      {{ allowed_categories_list | length == 0 or notification_category in allowed_categories_list }}

  - condition: template
    value_template: >-
      {{ allowed_channels_list | length == 0 or notification_channel in allowed_channels_list }}

  - condition: template
    value_template: >-
      {{ allowed_titles_list | length == 0 or notification_title in allowed_titles_list }}

  - condition: template
    value_template: >-
      {{ allowed_destinations_list | length == 0 or notification_destination in allowed_destinations_list }}

action: !input queue_action
