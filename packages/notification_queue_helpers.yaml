    icon: mdi:garage-alert-variant

  notification_queue_phone_call:
    name: Notification Queue Phone Call
    icon: mdi:phone-incoming

  notification_queue_phone_message:
    name: Notification Queue Phone Message
    icon: mdi:message-text
