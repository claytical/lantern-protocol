blueprint:
  name: Notification Queue - Event Entity to Action
  description: >-
    Run a configurable action when an event entity changes. Useful for doorbells or integrations
    that expose events as Home Assistant event entities.
  domain: automation
  source_url: https://github.com/placeholder/ha-notification-queue-blueprints/blob/main/blueprints/automation/event_to_queue_action.yaml

  input:
    event_entity:
      name: Event entity
      selector:
        entity:
          domain: event

    queue_action:
      name: Queue action
      description: "Example: turn on input_boolean.notification_queue_doorbell."
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input event_entity

action: !input queue_action
