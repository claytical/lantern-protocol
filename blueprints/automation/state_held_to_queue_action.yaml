blueprint:
  name: Notification Queue - State Held to Action
  description: >-
    Run a configurable action when an entity remains in a selected state for a configured duration.
    Use this for conditions like a garage door being open too long.
  domain: automation
  source_url: https://github.com/placeholder/ha-notification-queue-blueprints/blob/main/blueprints/automation/state_held_to_queue_action.yaml

  input:
    watched_entity:
      name: Watched entity
      selector:
        entity: {}

    target_state:
      name: Target state
      description: "Example values: open, closed, ringing, on, off."
      selector:
        text: {}

    held_duration:
      name: Held duration
      description: "Example: 00:10:00."
      default:
        minutes: 10
      selector:
        duration: {}

    queue_action:
      name: Queue action
      description: "Example: turn on input_boolean.notification_queue_garage_left_open."
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input watched_entity
    to: !input target_state
    for: !input held_duration

action: !input queue_action
