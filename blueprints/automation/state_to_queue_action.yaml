blueprint:
  name: Notification Queue - State to Action
  description: >-
    Run a configurable action when an entity changes to a selected state.
    Use this to turn on one notification queue helper when a device state changes.
  domain: automation
  source_url: https://github.com/placeholder/ha-notification-queue-blueprints/blob/main/blueprints/automation/state_to_queue_action.yaml

  input:
    watched_entity:
      name: Watched entity
      selector:
        entity: {}

    target_state:
      name: Target state
      description: "Example values: open, closed, ringing, on, off."
      selector:
        text: {}

    queue_action:
      name: Queue action
      description: "Example: turn on input_boolean.notification_queue_garage_opened."
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input watched_entity
    to: !input target_state

action: !input queue_action
