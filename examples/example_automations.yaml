###############################################################################
# Example automation actions
#
# These snippets are examples to paste into the queue_action field of the
# trigger blueprints. They use generic helper names from the optional package.
###############################################################################

# Doorbell queue action
- service: input_boolean.turn_on
  target:
    entity_id: input_boolean.notification_queue_doorbell

# Garage opened queue action
- service: input_boolean.turn_on
  target:
    entity_id: input_boolean.notification_queue_garage_opened

# Garage left open queue action; replaces the normal garage-opened alert.
- service: input_boolean.turn_off
  target:
    entity_id: input_boolean.notification_queue_garage_opened
- service: input_boolean.turn_on
  target:
    entity_id: input_boolean.notification_queue_garage_left_open

# Garage closed condition resolved; clears only the live problem condition.
- service: input_boolean.turn_off
  target:
    entity_id: input_boolean.notification_queue_garage_left_open

# Phone call queue action
- service: input_boolean.turn_on
  target:
    entity_id: input_boolean.notification_queue_phone_call

# Phone message queue action
- service: input_boolean.turn_on
  target:
    entity_id: input_boolean.notification_queue_phone_message
